<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="todo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1>TODO LIST</h1>

        <div class="top-bar">
            <div class="search-box">
                <button class="filter-btn"><i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <input type="text" placeholder="Search">
            </div>

            <a href="/To Do List/Add Items/add.html" class="add-btn-link">
                <button class="add-btn">Add</button>
            </a>

        </div>

        <div class="todo-grid">
            <div class="todo-card">
                <h3>Title1</h3>
                <p>Description</p>
                <br>
                <p>Priority</p>
            </div>

        </div>
    </div>
<script src="todo.js"></script>

</body>
</html>
